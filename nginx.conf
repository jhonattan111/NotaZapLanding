server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    # Atrás de mapeamento de porta (host 4321 -> container 80): faz o nginx
    # emitir Location relativo nos redirects de barra final, preservando a
    # porta/host que o navegador usou. Sem isto, /parceiros redireciona para
    # http://host/parceiros/ (porta 80 interna) e derruba o :4321.
    absolute_redirect off;
    port_in_redirect  off;

    root   /usr/share/nginx/html;
    index  index.html;

    # compressão
    gzip            on;
    gzip_vary       on;
    gzip_min_length 256;
    gzip_proxied    any;
    gzip_types      text/plain text/css application/javascript application/json
                    image/svg+xml application/xml font/woff2;

    # clean URLs do Astro (build.format "directory"):
    # /parceiros -> /parceiros/index.html
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # assets com hash: cache longo e imutável
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # imagens/fontes estáticas: cache moderado
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # página 404 do próprio site, se existir
    error_page 404 /404.html;
}
